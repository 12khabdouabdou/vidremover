name: Android Build CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Show Android SDK info
      run: |
        echo "ANDROID_HOME: $ANDROID_HOME"
        echo "SDK platforms:"
        ls -la $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms"
        echo "Build tools:"
        ls -la $ANDROID_HOME/build-tools/ 2>/dev/null || echo "No build-tools"

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace 2>&1 | tee build.log

    - name: Show build errors if any
      if: failure()
      run: |
        echo "=== Build Log Tail ==="
        tail -100 build.log
        echo "=== Gradle Outputs ==="
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No APK generated"

    - name: Upload APK Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk